; Simple php.ini for OpenBrigade (development/containers)
; Adjust values as needed per environment

memory_limit = 512M
post_max_size = 32M
upload_max_filesize = 32M
max_execution_time = 120
max_input_time = 120
allow_url_fopen = On
expose_php = Off
display_errors = Off
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php_errors.log
date.timezone = Europe/Paris
session.gc_maxlifetime = 1440
cgi.fix_pathinfo = 0