services:
  # ── Compose profiles ───────────────────────────────────────────────────────
  # Pick a stack with --profile (or COMPOSE_PROFILES in .env). Profiles nest:
  #   app      → app only
  #   minimal  → app + db
  #   full     → app + db + clamav + GlitchTip (postgres/redis/web/worker/migrate)
  #   dev      → full + dbgate
  # Every service is profiled, so a bare `docker compose up` with no profile
  # starts nothing — always pass a profile or set COMPOSE_PROFILES.
  app:
    build:
      context: .
      args:
        BUILD_ENV: ${APP_ENV:-development}
        NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
        COMPOSER_DISABLE_TLS: ${COMPOSER_DISABLE_TLS:-0}

    container_name: openbrigade_app
    restart: unless-stopped
    profiles: [app, minimal, full, dev]

    ports:
      - "${APP_PORT:-8080}:80"

    env_file:
      - .env

    environment:
      DB_HOST: db
      DB_PORT: 3306
      AUTO_RUN_MIGRATIONS: 1
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
      COMPOSER_DISABLE_TLS: ${COMPOSER_DISABLE_TLS:-0}
      # Upload malware scanning defaults ON in Docker (a clamav service ships below).
      # The admin can still flip it off in Sécurité ▸ Renforcement.
      SECURITY_UPLOAD_SCAN: ${SECURITY_UPLOAD_SCAN:-1}

    volumes:
      # Use local source files directly (dev-friendly, no code copy inside running container)
      - ./:/var/www/html:Z

      # Laravel storage
      - storage_uploads:/var/www/html/storage/app/public/uploads
      - storage_logs:/var/www/html/storage/logs

    depends_on:
      # required:false → in the "app"/"minimal" profiles where these services are
      # not enabled, the app still starts (instead of erroring on a missing dep).
      db:
        condition: service_healthy
        required: false
      # Soft dependency only: the scanner fails open, so the app must not wait on
      # clamav's slow first-run signature download to come up.
      clamav:
        condition: service_started
        required: false

  clamav:
    image: clamav/clamav:1.4
    container_name: openbrigade_clamav
    restart: unless-stopped
    profiles: [full, dev]

    # The clamd INSTREAM endpoint used by App\Support\ClamavScanner.
    # Reachable from the app container as host "clamav" on port 3310.
    expose:
      - "3310"

    volumes:
      - clamav_db:/var/lib/clamav

    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 6
      # Generous start period: the first freshclam signature download is slow.
      start_period: 180s

  db:
    image: mariadb:11.4
    container_name: openbrigade_db
    restart: unless-stopped
    profiles: [minimal, full, dev]

    ports:
      - "${DB_PORT_EXTERNAL:-3306}:3306"

    env_file:
      - .env

    environment:
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-CHANGE_ME_ROOT}"
      MARIADB_DATABASE: "${DB_NAME:-openbrigade}"
      MARIADB_USER: "${DB_USER:-openbrigade}"
      MARIADB_PASSWORD: "${DB_PASSWORD:-CHANGE_ME}"

    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Self-hosted error tracking (Sentry-API compatible) ───────────────────
  # GlitchTip is a lightweight, Sentry-compatible server: the app's
  # sentry/sentry-laravel SDK reports to it unchanged. Part of the "full" and
  # "dev" profiles: `docker compose --profile full up -d`.
  # After first start, open http://localhost:${GLITCHTIP_PORT:-8000}, create an
  # account + project, copy its DSN into SENTRY_LARAVEL_DSN, then enable error
  # tracking under Administration ▸ Journal d'activité ▸ Paramètres.
  glitchtip-postgres:
    image: postgres:16-alpine
    container_name: openbrigade_glitchtip_db
    restart: unless-stopped
    profiles: [full, dev]
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: "${GLITCHTIP_DB_PASSWORD:-CHANGE_ME_GT}"
    volumes:
      - glitchtip_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5

  glitchtip-redis:
    image: redis:7-alpine
    container_name: openbrigade_glitchtip_redis
    restart: unless-stopped
    profiles: [full, dev]
    volumes:
      - glitchtip_redis:/data

  glitchtip-web:
    image: glitchtip/glitchtip:v4.1.4
    container_name: openbrigade_glitchtip_web
    restart: unless-stopped
    profiles: [full, dev]
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started
    ports:
      - "${GLITCHTIP_PORT:-8000}:8080"
    environment:
      DATABASE_URL: "postgres://glitchtip:${GLITCHTIP_DB_PASSWORD:-CHANGE_ME_GT}@glitchtip-postgres:5432/glitchtip"
      REDIS_URL: "redis://glitchtip-redis:6379/0"
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY:-CHANGE_ME_GLITCHTIP_SECRET_KEY}"
      PORT: "8080"
      GLITCHTIP_DOMAIN: "${GLITCHTIP_DOMAIN:-http://localhost:8000}"
      DEFAULT_FROM_EMAIL: "${GLITCHTIP_FROM_EMAIL:-glitchtip@openbrigade.local}"
      EMAIL_URL: "${GLITCHTIP_EMAIL_URL:-consolemail://}"
      # Self-hosted single-org instance: disable open registration after setup.
      ENABLE_OPEN_USER_REGISTRATION: "${GLITCHTIP_OPEN_REGISTRATION:-true}"
    volumes:
      - glitchtip_uploads:/code/uploads

  glitchtip-worker:
    image: glitchtip/glitchtip:v4.1.4
    container_name: openbrigade_glitchtip_worker
    restart: unless-stopped
    profiles: [full, dev]
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgres://glitchtip:${GLITCHTIP_DB_PASSWORD:-CHANGE_ME_GT}@glitchtip-postgres:5432/glitchtip"
      REDIS_URL: "redis://glitchtip-redis:6379/0"
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY:-CHANGE_ME_GLITCHTIP_SECRET_KEY}"
      GLITCHTIP_DOMAIN: "${GLITCHTIP_DOMAIN:-http://localhost:8000}"
      DEFAULT_FROM_EMAIL: "${GLITCHTIP_FROM_EMAIL:-glitchtip@openbrigade.local}"
      EMAIL_URL: "${GLITCHTIP_EMAIL_URL:-consolemail://}"
    volumes:
      - glitchtip_uploads:/code/uploads

  glitchtip-migrate:
    image: glitchtip/glitchtip:v4.1.4
    container_name: openbrigade_glitchtip_migrate
    profiles: [full, dev]
    command: ./manage.py migrate
    restart: "no"
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://glitchtip:${GLITCHTIP_DB_PASSWORD:-CHANGE_ME_GT}@glitchtip-postgres:5432/glitchtip"
      REDIS_URL: "redis://glitchtip-redis:6379/0"
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY:-CHANGE_ME_GLITCHTIP_SECRET_KEY}"

  dbgate:
    image: dbgate/dbgate:7.2.0
    container_name: openbrigade_dbgate
    restart: unless-stopped
    profiles: [dev]

    ports:
      - "${DBGATE_PORT:-8888}:3000"

    environment:
      CONNECTIONS: CON1
      ENGINE_CON1: mariadb@dbgate-plugin-mysql
      SERVER_CON1: db
      PORT_CON1: "3306"
      USER_CON1: "${DB_USER:-openbrigade}"
      PASSWORD_CON1: "${DB_PASSWORD:-CHANGE_ME}"
      DATABASE_CON1: "${DB_NAME:-openbrigade}"
      LABEL_CON1: OpenBrigade DB

    depends_on:
      - db

volumes:
  db_data:
  storage_uploads:
  storage_logs:
  clamav_db:
  glitchtip_pg:
  glitchtip_redis:
  glitchtip_uploads: