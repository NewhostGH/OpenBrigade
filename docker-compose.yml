services:
  app:
    build:
      context: .
      args:
        BUILD_ENV: ${APP_ENV:-development}
        NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
        COMPOSER_DISABLE_TLS: ${COMPOSER_DISABLE_TLS:-0}

    container_name: openbrigade_app
    restart: unless-stopped

    ports:
      - "${APP_PORT:-8080}:80"

    env_file:
      - .env

    environment:
      DB_HOST: db
      DB_PORT: 3306
      AUTO_RUN_MIGRATIONS: 1
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
      COMPOSER_DISABLE_TLS: ${COMPOSER_DISABLE_TLS:-0}
      # Upload malware scanning defaults ON in Docker (a clamav service ships below).
      # The admin can still flip it off in Sécurité ▸ Renforcement.
      SECURITY_UPLOAD_SCAN: ${SECURITY_UPLOAD_SCAN:-1}

    volumes:
      # Use local source files directly (dev-friendly, no code copy inside running container)
      - ./:/var/www/html:Z

      # Laravel storage
      - storage_uploads:/var/www/html/storage/app/public/uploads
      - storage_logs:/var/www/html/storage/logs

    depends_on:
      db:
        condition: service_healthy
      # Soft dependency only: the scanner fails open, so the app must not wait on
      # clamav's slow first-run signature download to come up.
      clamav:
        condition: service_started

  clamav:
    image: clamav/clamav:1.4
    container_name: openbrigade_clamav
    restart: unless-stopped

    # The clamd INSTREAM endpoint used by App\Support\ClamavScanner.
    # Reachable from the app container as host "clamav" on port 3310.
    expose:
      - "3310"

    volumes:
      - clamav_db:/var/lib/clamav

    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 6
      # Generous start period: the first freshclam signature download is slow.
      start_period: 180s

  db:
    image: mariadb:11.4
    container_name: openbrigade_db
    restart: unless-stopped

    ports:
      - "${DB_PORT_EXTERNAL:-3306}:3306"

    env_file:
      - .env

    environment:
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-CHANGE_ME_ROOT}"
      MARIADB_DATABASE: "${DB_NAME:-openbrigade}"
      MARIADB_USER: "${DB_USER:-openbrigade}"
      MARIADB_PASSWORD: "${DB_PASSWORD:-CHANGE_ME}"

    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  dbgate:
    image: dbgate/dbgate:7.2.0
    container_name: openbrigade_dbgate
    restart: unless-stopped
    profiles:
      - development

    ports:
      - "${DBGATE_PORT:-8888}:3000"

    environment:
      CONNECTIONS: CON1
      ENGINE_CON1: mariadb@dbgate-plugin-mysql
      SERVER_CON1: db
      PORT_CON1: "3306"
      USER_CON1: "${DB_USER:-openbrigade}"
      PASSWORD_CON1: "${DB_PASSWORD:-CHANGE_ME}"
      DATABASE_CON1: "${DB_NAME:-openbrigade}"
      LABEL_CON1: OpenBrigade DB

    depends_on:
      - db

volumes:
  db_data:
  storage_uploads:
  storage_logs:
  clamav_db: