# Dev-only Compose file – used exclusively by the VS Code Dev Container.
# The production stack is defined in the root docker-compose.yml.

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: openbrigade_dev
    volumes:
      # Mount the repo root into the container so edits are reflected instantly
      - ..:/var/www/html:cached
      # Persist Composer cache across rebuilds
      - composer-cache:/root/.composer/cache
    # Keep the container alive; Apache inside the devcontainer image serves the app
    command: sleep infinity
    environment:
      APP_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: "${DB_NAME:-openbrigade}"
      DB_USER: "${DB_USER:-openbrigade}"
      DB_PASSWORD: "${DB_PASSWORD:-CHANGE_ME}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11.4
    container_name: openbrigade_dev_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-CHANGE_ME_ROOT}"
      MARIADB_DATABASE: "${DB_NAME:-openbrigade}"
      MARIADB_USER: "${DB_USER:-openbrigade}"
      MARIADB_PASSWORD: "${DB_PASSWORD:-CHANGE_ME}"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:5
    container_name: openbrigade_dev_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: "${DB_USER:-openbrigade}"
      PMA_PASSWORD: "${DB_PASSWORD:-CHANGE_ME}"
    depends_on:
      - db

volumes:
  db_data:
  composer-cache:
