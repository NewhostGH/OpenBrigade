user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 25M;

    server {
        listen 80;
        server_name _;

        # Keep application redirects relative so host/port from the Docker host
        # mapping are preserved by the client (prevents nginx converting
        # '/login' into 'http://localhost/login' without the external port).
        absolute_redirect off;

        root /var/www/html/public;
        index index.php;

        # Serve static assets directly; fall back to PHP front controller
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Pass PHP requests to PHP-FPM
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            # Override after include: fastcgi_params sets HTTP_HOST=$host which strips the
            # port; $http_host preserves it so Laravel sees the correct host:port pair.
            fastcgi_param HTTP_HOST $http_host;
            fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        }

        # Deny access to hidden files and sensitive directories
        location ~ /\. {
            deny all;
        }

        location ~* ^/(app|bootstrap|config|database|resources|routes|storage|tests|vendor)/ {
            deny all;
        }
    }
}
